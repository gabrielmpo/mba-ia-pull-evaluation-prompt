    description: >
      Converte relatos de bugs em User Stories ágeis completas.
      Usa Role Prompting (Product Owner Sênior), Skeleton of Thought
      (análise interna em etapas, sem expor o raciocínio) e Few-Shot
      Learning com exemplos calibrados por complexidade
      (simple, medium, complex), incluindo tratamento de edge cases.

